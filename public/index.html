<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOXVUS — Deploy</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #03060a;
      --surface: #070f18;
      --card:    #0a141f;
      --border:  #0e2030;
      --accent:  #949494;
      --accent2: #373737;
      --glow:    rgba(0,180,255,0.18);
      --glowsm:  rgba(0,180,255,0.07);
      --text:    #FFFFFF;
      --muted:   #3D3D3D;
      --success: #00ffaa;
      --danger:  #ff3355;
      --mono:    'Share Tech Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

body {
  background: linear-gradient(270deg, #000000, #575863, #FFFFFF);
  background-size: 600% 600%;
  animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

    /* BG grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,180,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,180,255,0.025) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none; z-index: 0;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 0;
    }

    .wrap {
      position: relative; z-index: 2;
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 20px 100px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      animation: fadeDown .5s ease both;
    }

    .logo {
      font-family: var(--display);
      font-size: clamp(3.5rem, 12vw, 6rem);
      letter-spacing: .15em;
      line-height: 1;
      color: #fff;
      text-shadow:
        0 0 30px rgba(0, 0, 0, 1),
        0 0 80px rgba(111, 111, 112, 1),
        0 0 2px #fff;
    }

    .logo-sub {
      font-size: .68rem;
      letter-spacing: .5em;
      color: var(--text);
      text-transform: uppercase;
      margin-top: 6px;
    }

    .header-line {
      width: 240px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 18px auto 0;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      position: relative;
      animation: fadeUp .5s ease both;
      animation-delay: .15s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .card-head {
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot { width: 6px; height: 6px; background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    .card-label {
      font-size: .68rem;
      letter-spacing: .2em;
      color: var(--text);
      text-transform: uppercase;
    }

    .card-body { padding: 28px 22px; }

    /* ── FORM ── */
    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: .65rem;
      letter-spacing: .18em;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      font-family: var(--mono);
      font-size: .85rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .field input[type="text"]:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px var(--glowsm), inset 0 0 12px var(--glowsm);
    }

    .field input[type="text"]::placeholder { color: #3D3D3D; }

    /* Dropzone */
    .drop {
      position: relative;
      background: var(--surface);
      border: 1px dashed var(--border);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .drop:hover, .drop.over {
      border-color: var(--accent2);
      background: rgba(0,100,200,.05);
    }

    .drop.ready {
      border-style: solid;
      border-color: var(--success);
    }

    .drop input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }

    .drop-icon {
      font-size: 1.8rem;
      color: var(--text);
      margin-bottom: 8px;
      transition: color .2s;
    }

    .drop:hover .drop-icon { color: var(--accent); }
    .drop.ready .drop-icon { color: var(--success); }

    .drop-hint {
      font-size: .68rem;
      letter-spacing: .1em;
      color: var(--text);
    }

    .drop-fname {
      font-size: .75rem;
      color: var(--success);
      margin-top: 6px;
      text-shadow: 0 0 8px rgba(61, 61, 61, 1);
      min-height: 1.2em;
    }

    /* Hint text */
    .hint {
      font-size: .62rem;
      color: var(--text);
      letter-spacing: .08em;
      margin-top: 6px;
    }

    /* Submit */
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: .8rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color .25s;
    }

    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .25s ease;
      z-index: -1;
    }

    .btn:hover::before { transform: scaleX(1); }
    .btn:hover { color: #000; }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn:disabled::before { display: none; }

    /* ── RESULT ── */
    #result {
      margin-top: 18px;
      display: none;
      animation: fadeUp .4s ease both;
    }

    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 18px 20px;
    }

    .result-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .status-dot {
      width: 8px; height: 8px; flex-shrink: 0;
    }

    .status-dot.loading {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 1s infinite;
    }

    .status-dot.ok {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .status-dot.err {
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }

    .status-msg {
      font-size: .8rem;
      color: var(--text);
    }

    /* URL display */
    .url-wrap {
      display: none;
      margin-top: 4px;
    }

    .url-label {
      font-size: .6rem;
      letter-spacing: .15em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .url-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .url-text {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: .8rem;
      color: var(--accent);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 0 10px rgba(61, 61, 61, 1);
    }

    .btn-copy {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent);
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .1em;
      padding: 0 14px;
      cursor: pointer;
      transition: background .2s, color .2s;
      white-space: nowrap;
    }

    .btn-copy:hover { background: var(--accent2); color: #000; }
    .btn-copy.copied { background: var(--success); color: #000; border-color: var(--success); }

    .btn-open {
      display: block;
      margin-top: 10px;
      padding: 10px;
      background: rgba(0,255,170,.08);
      border: 1px solid rgba(61, 61, 61, 1);
      color: var(--success);
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .2em;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      transition: background .2s;
    }

    .btn-open:hover { background: rgba(255, 255, 255, 1); }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 48px;
      font-size: .6rem;
      letter-spacing: .2em;
      color: #FBFBFF;
      animation: fadeUp .5s ease both;
      animation-delay: .3s;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .15; }
    }

    @media (max-width: 480px) {
      .url-row { flex-direction: column; }
      .btn-copy { padding: 8px; }
    }
  .video-box {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0;
}

.video-box video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
   
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">NOXVUS</div>
    <div class="logo-sub">Instant Web Deploy</div>
    <div class="header-line"></div>
  </header>
  
  <div class="video-box">
    <video src="https://files.catbox.moe/gnf5hh.mp4" autoplay muted loop></video>
  </div>
  
  <div class="card">
    <div class="card-head">
      <div class="dot"></div>
      <div class="card-label">Deploy Configuration</div>
    </div>
    <div class="card-body">

      <div class="field">
        <label>Web Name</label>
        <input type="text" id="site_name" placeholder="my-awesome-site" maxlength="30" />
        <div class="hint">* huruf kecil, angka, strip aja. kosongkan = auto generate</div>
      </div>

      <div class="field">
        <label>Upload HTML atau ZIP</label>
        <div class="drop" id="drop-zone">
          <input type="file" id="site_file" accept=".html,.zip" />
          <div class="drop-icon">⬆</div>
          <div class="drop-hint">DROP FILE DI SINI ATAU KLIK</div>
          <div class="drop-hint" style="margin-top:4px;font-size:.6rem;">HTML / ZIP (max 20MB)</div>
          <div class="drop-fname" id="file-name"></div>
        </div>
      </div>

      <button class="btn" id="deploy-btn" disabled>[ DEPLOY NOW ]</button>
    </div>
  </div>

  <!-- Result -->
  <div id="result">
    <div class="result-box">
      <div class="result-status">
        <div class="status-dot loading" id="sdot"></div>
        <div class="status-msg" id="smsg">Deploying...</div>
      </div>
      <div class="url-wrap" id="url-wrap">
        <div class="url-label">LIVE URL</div>
        <div class="url-row">
          <div class="url-text" id="url-text"></div>
          <button class="btn-copy" id="btn-copy">COPY</button>
        </div>
        <a href="#" id="btn-open" target="_blank" class="btn-open">[ BUKA WEB ]</a>
      </div>
    </div>
  </div>

  <footer>NOXVUS &mdash; @xzrinx &mdash; POWERED BY NETLIFY</footer>
</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('site_file');
  const fileName  = document.getElementById('file-name');
  const deployBtn = document.getElementById('deploy-btn');

  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    if (!f) return;
    fileName.textContent = f.name;
    dropZone.classList.add('ready');
    deployBtn.disabled = false;
  });

  ['dragover','dragleave','drop'].forEach(ev => {
    dropZone.addEventListener(ev, e => {
      e.preventDefault();
      if (ev === 'dragover') dropZone.classList.add('over');
      else dropZone.classList.remove('over');
    });
  });

  // Deploy
  deployBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) return;

    deployBtn.disabled = true;
    deployBtn.textContent = '[ DEPLOYING... ]';

    const result = document.getElementById('result');
    const sdot   = document.getElementById('sdot');
    const smsg   = document.getElementById('smsg');
    const urlWrap = document.getElementById('url-wrap');

    result.style.display = 'block';
    sdot.className = 'status-dot loading';
    smsg.textContent = 'Uploading & deploying...';
    urlWrap.style.display = 'none';

    const fd = new FormData();
    fd.append('site_file', file);
    fd.append('site_name', document.getElementById('site_name').value.trim());

    try {
      const res  = await fetch('/api/deploy', { method: 'POST', body: fd });
      const data = await res.json();

      if (!data.success) {
        sdot.className = 'status-dot err';
        smsg.textContent = 'Gagal: ' + (data.error || 'Unknown error');
        deployBtn.disabled = false;
        deployBtn.textContent = '[ DEPLOY NOW ]';
        return;
      }

      sdot.className = 'status-dot ok';
      smsg.textContent = 'Site live!';

      const url = data.site_url;
      document.getElementById('url-text').textContent = url;
      document.getElementById('btn-open').href = url;
      urlWrap.style.display = 'block';

      deployBtn.textContent = '[ DEPLOY LAGI ]';
      deployBtn.disabled = false;

    } catch (e) {
      sdot.className = 'status-dot err';
      smsg.textContent = 'Error: ' + e.message;
      deployBtn.disabled = false;
      deployBtn.textContent = '[ DEPLOY NOW ]';
    }
  });

  // Copy button
  document.getElementById('btn-copy').addEventListener('click', () => {
    const url = document.getElementById('url-text').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = 'COPIED!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'COPY';
        btn.classList.remove('copied');
      }, 2000);
    });
  });
</script>
</body>
</html>
